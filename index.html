<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Catalog Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-main">
        <h1>Product Catalog</h1>
        <p class="subtitle">
          Manage products and explore advanced filtering &amp; sorting.
        </p>
      </div>
    </header>

    <main class="app-main">
      <section class="panel">
        <h2>Filters &amp; Sorting</h2>
        <form id="filters-form" class="filters-grid">
          <div class="field">
            <label for="search">Search</label>
            <input
              type="text"
              id="search"
              name="search"
              placeholder="Name or description"
            />
          </div>

          <div class="field">
            <label for="categoryFilter">Category</label>
            <input
              type="text"
              id="categoryFilter"
              name="category"
              placeholder="e.g. electronics"
            />
          </div>

          <div class="field">
            <label for="minPrice">Min Price</label>
            <input
              type="number"
              id="minPrice"
              name="minPrice"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>

          <div class="field">
            <label for="maxPrice">Max Price</label>
            <input
              type="number"
              id="maxPrice"
              name="maxPrice"
              min="0"
              step="0.01"
              placeholder="9999.99"
            />
          </div>

          <div class="field">
            <label for="sort">Sort By</label>
            <select id="sort" name="sort">
              <option value="">None</option>
              <option value="price_asc">Price (Low → High)</option>
              <option value="price_desc">Price (High → Low)</option>
              <option value="name_asc">Name (A → Z)</option>
              <option value="name_desc">Name (Z → A)</option>
              <option value="stock_desc">Stock (High → Low)</option>
            </select>
          </div>

          <div class="filters-actions">
            <button type="submit" class="btn primary">Apply</button>
            <button type="button" id="resetFilters" class="btn ghost">
              Reset
            </button>
          </div>
        </form>
      </section>

      <section class="layout-two-columns">
        <section class="panel">
          <div class="panel-header">
            <h2>Products</h2>
            <span id="productsCount" class="badge muted">0 items</span>
          </div>
          <div class="table-wrapper">
            <table class="products-table">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Category</th>
                  <th class="numeric">Price</th>
                  <th class="numeric">Stock</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="productsBody">
                <tr>
                  <td colspan="5" class="empty-state">
                    No products yet. Try adding one.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div id="listLoading" class="loading-indicator hidden">
            Loading products…
          </div>
          <div id="listError" class="error-message hidden"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 id="formTitle">Add Product</h2>
          </div>
          <form id="productForm" class="form-grid">
            <input type="hidden" id="productId" />

            <div class="field full-width">
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="Wireless Headphones"
              />
            </div>

            <div class="field full-width">
              <label for="description">Description</label>
              <textarea
                id="description"
                name="description"
                rows="3"
                placeholder="Short description of the product"
              ></textarea>
            </div>

            <div class="field">
              <label for="price">Price</label>
              <input
                type="number"
                id="price"
                name="price"
                min="0"
                step="0.01"
                required
                placeholder="99.99"
              />
            </div>

            <div class="field">
              <label for="category">Category</label>
              <input
                type="text"
                id="category"
                name="category"
                required
                placeholder="electronics"
              />
            </div>

            <div class="field">
              <label for="stockCount">Stock Count</label>
              <input
                type="number"
                id="stockCount"
                name="stockCount"
                min="0"
                step="1"
                required
                placeholder="10"
              />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn primary" id="saveButton">
                Save Product
              </button>
              <button
                type="button"
                class="btn ghost"
                id="cancelEditButton"
                disabled
              >
                Cancel Edit
              </button>
            </div>

            <div id="formStatus" class="form-status"></div>
          </form>
        </section>
      </section>
    </main>

    <footer class="app-footer">
      <span>
        Frontend only. Configure your API base URL in
        <code>app.js</code>.
      </span>
    </footer>

    <script src="./app.js" type="module"></script>
  </body>
</html>
